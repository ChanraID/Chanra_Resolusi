<!DOCTYPE html>
<html lang="id">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, intial-scale=1.0">
        <title>Mencoba Spotify</title>

        <link rel="stylesheet" href="style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
        <link rel="icon" type="image/png" href="spotipi.svg">
    </head>
    <body>

        <div class="login-wrapper">

            <header class="header">
                <i class="fa-brands fa-spotify logo-icon"></i>
                <h1 class="main-title">Selamat datang kembali</h1>
            </header>

            <div class="login-form">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="custom-input" required>
                </div>
                <button type="submit" class="btn-primary">Lanjutkan</button>
            </div>

            <div class="divider">
                <span class="divider-text">atau</span>
            </div>

            <div class="social-login">
                <button class="btn-social">
                    <i class="fa-solid fa-mobile"></i>Lanjutkan dengan nomor telepon
                </button>
                <button class="btn-social">
                    <i class="fa-brands fa-google"></i>Lanjutkan dengan google
                </button>
                <button class="btn-social">
                    <i class="fa-brands fa-facebook"></i>Lanjutkan dengan facebook
                </button>
                <button class="btn-social">
                    <i class="fa-brands fa-apple"></i>Lanjutkan dengan apple
                </button>
            </div>

            <div class="signup-prompt">
                <p>Tidak punya akun</p>
                <a href="#" class="signup-link">Daftar</a>
            </div>

            <footer class="legal-footer">
                <p>Situs ini dilindungi oleh reCAPTCHA dan <a href="#">Kebijakan Privasi</a> serta <br>
                <a href="#">Persyaratan Layanan</a> Googgle Berlaku</p>
            </footer>


        </div>

    </body>
</html>
